[env:control_CAN_hoverboard]
; CAN bus control via MCP2515 + Hoverboard sensor support
; Combines CAN control with hoverboard sensor reading on USART2/3
platform = ststm32
framework = stm32cube
debug_tool = stlink
board = genericSTM32F103RC
board_build.ldscript = STM32F103RCTx_FLASH.ld

build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F103xE
    -Wl,-lc
    -Wl,-lm
    -Og
#    -Wl,-lnosys
    -D CONTROL_TYPE=8        ; Use CAN_WITH_HOVERBOARD from config.h

[env:CAN_BUS]
; CAN bus ONLY control via MCP2515 - NO hoverboard sensors
; PA2/PA3 and PB10/PB11 used for Software SPI to MCP2515
; PA13/PA14 (SWD pins) used for debug serial output
platform = ststm32
framework = stm32cube
debug_tool = stlink
board = genericSTM32F103RC
board_build.ldscript = STM32F103RCTx_FLASH.ld

build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F103xE
    -Wl,-lc
    -Wl,-lm
    -Og
    -D CONTROL_TYPE=9        ; Use CAN_BUS from config.h
    -D CAN_BOARD_ID=0        ; Board ID 0 (configurable)

[env:CAN_BUS_board1]
; CAN bus ONLY control - Board ID 1
platform = ststm32
framework = stm32cube
debug_tool = stlink
board = genericSTM32F103RC
board_build.ldscript = STM32F103RCTx_FLASH.ld

build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F103xE
    -Wl,-lc
